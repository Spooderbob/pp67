<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB The Show 26 Marketplace Advisor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0f; color: #e9ecf1; line-height: 1.55; }
        .header { background: linear-gradient(135deg, #003087 0%, #c8102e 100%); padding: 2rem; text-align: center; }
        .header h1 { font-size: 2.2rem; font-weight: 700; }
        .header p { font-size: 1rem; opacity: 0.9; margin-top: .25rem; }
        .stats-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 2.5rem; padding: 1.25rem; background: #14141c; border-bottom: 1px solid #262634; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.7rem; font-weight: 600; color: #f5b400; }
        .stat-label { font-size: 0.85rem; opacity: 0.7; }
        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }
        .refresh-notice { text-align: center; padding: .75rem; background: #14141c; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.85rem; opacity: 0.85; }
        .picks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; }
        .pick-card { background: #14141c; border: 1px solid #262634; border-radius: 12px; padding: 1.25rem; transition: border-color .2s, transform .2s; }
        .pick-card:hover { border-color: #f5b400; transform: translateY(-3px); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: .5rem; }
        .player-name { font-size: 1.15rem; font-weight: 600; }
        .player-meta { font-size: 0.8rem; opacity: 0.7; margin-top: 2px; }
        .rarity { font-size: 0.7rem; padding: .15rem .5rem; border-radius: 4px; font-weight: 600; letter-spacing: .04em; }
        .Diamond { background: rgba(110, 231, 255, 0.15); color: #6ee7ff; }
        .Gold { background: rgba(255, 196, 0, 0.15); color: #ffc400; }
        .Silver { background: rgba(200, 200, 215, 0.15); color: #c8c8d7; }
        .Bronze { background: rgba(195, 109, 50, 0.15); color: #c36d32; }
        .Common { background: rgba(150, 150, 150, 0.15); color: #aaa; }
        .price-row { display: flex; justify-content: space-between; margin: 1rem 0 .5rem; font-size: 0.9rem; }
        .price-cell { flex: 1; text-align: center; padding: .5rem; background: #0a0a0f; border-radius: 6px; margin: 0 .25rem; }
        .price-cell .label { font-size: 0.7rem; opacity: 0.65; text-transform: uppercase; letter-spacing: .04em; }
        .price-cell .value { font-size: 1.05rem; font-weight: 600; margin-top: .15rem; }
        .profit { color: #2ecc71; }
        .roi { color: #f5b400; }
        .conf-row { display: flex; align-items: center; gap: .75rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #262634; }
        .conf-label { font-size: 0.75rem; opacity: 0.7; }
        .conf-bar { flex: 1; height: 8px; background: #262634; border-radius: 4px; overflow: hidden; }
        .conf-fill { height: 100%; background: linear-gradient(90deg, #c0392b, #f5b400, #2ecc71); }
        .conf-value { font-weight: 700; min-width: 3.5em; text-align: right; }
        .reasons { margin-top: .8rem; font-size: 0.82rem; opacity: 0.85; }
        .reasons li { margin-left: 1rem; margin-top: .25rem; }
        .loading, .error, .empty { text-align: center; padding: 3rem; font-size: 1rem; opacity: 0.8; }
        .error { color: #ff6b6b; }
        @media (max-width: 768px) { .header h1 { font-size: 1.6rem; } .stats-bar { gap: 1rem; } .picks-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>MLB The Show 26 Marketplace Advisor</h1>
        <p>Top flip opportunities ranked by net profit and confidence</p>
    </div>

    <div class="stats-bar">
        <div class="stat">
            <div class="stat-value" id="totalPicks">—</div>
            <div class="stat-label">Qualifying Picks</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="avgConf">—</div>
            <div class="stat-label">Avg Confidence</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="topProfit">—</div>
            <div class="stat-label">Best Net / Flip</div>
        </div>
    </div>

    <div class="container">
        <div class="refresh-notice">
            Generated by <code>python run_advisor.py export</code>. Last updated:
            <span id="lastUpdate">loading…</span>
        </div>
        <div id="picksContainer" class="picks-grid">
            <div class="loading">Loading picks…</div>
        </div>
    </div>

    <script>
        function fmt(n) { return Number(n).toLocaleString(); }
        function fmtTime(iso) {
            try { return new Date(iso).toLocaleString(); } catch { return iso; }
        }

        function render(data) {
            const container = document.getElementById("picksContainer");
            document.getElementById("lastUpdate").textContent = fmtTime(data.timestamp);
            document.getElementById("totalPicks").textContent = data.totalPicks ?? 0;

            if (!data.picks || data.picks.length === 0) {
                container.innerHTML = '<div class="empty">No qualifying picks. Run <code>python run_advisor.py scan</code> then <code>export</code>.</div>';
                document.getElementById("avgConf").textContent = "—";
                document.getElementById("topProfit").textContent = "—";
                return;
            }

            const avg = data.picks.reduce((a, p) => a + p.confidence, 0) / data.picks.length;
            document.getElementById("avgConf").textContent = avg.toFixed(0) + "%";
            const best = Math.max(...data.picks.map(p => p.profit));
            document.getElementById("topProfit").textContent = fmt(best);

            container.innerHTML = data.picks.map(p => `
                <div class="pick-card">
                    <div class="card-header">
                        <div>
                            <div class="player-name">${p.card}</div>
                            <div class="player-meta">${p.team} · ${p.position} · ${p.ovr} OVR · ${p.series}</div>
                        </div>
                        <div class="rarity ${p.rarity}">${p.rarity}</div>
                    </div>
                    <div class="price-row">
                        <div class="price-cell">
                            <div class="label">Buy @</div>
                            <div class="value">${fmt(p.buyAt)}</div>
                        </div>
                        <div class="price-cell">
                            <div class="label">Sell @</div>
                            <div class="value">${fmt(p.sellAt)}</div>
                        </div>
                        <div class="price-cell">
                            <div class="label">Net / Flip</div>
                            <div class="value profit">${fmt(p.profit)}</div>
                        </div>
                        <div class="price-cell">
                            <div class="label">ROI</div>
                            <div class="value roi">${p.roi.toFixed(1)}%</div>
                        </div>
                    </div>
                    <div class="conf-row">
                        <span class="conf-label">Confidence</span>
                        <div class="conf-bar"><div class="conf-fill" style="width:${p.confidence}%"></div></div>
                        <span class="conf-value">${p.confidence}/100</span>
                    </div>
                    <ul class="reasons">
                        ${p.reasons.map(r => `<li>${r}</li>`).join("")}
                    </ul>
                </div>
            `).join("");
        }

        function load() {
            fetch("picks.json", { cache: "no-store" })
                .then(r => r.json())
                .then(render)
                .catch(err => {
                    document.getElementById("picksContainer").innerHTML =
                        '<div class="error">Failed to load picks.json — ' + err + '</div>';
                });
        }

        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
